name: Build Agent

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install nuitka pystray pillow aiohttp cloudinary ordered-set zstandard
      - name: Build with Nuitka
        run: |
          python -m nuitka --onefile --assume-yes-for-downloads --enable-plugin=tk-inter --windows-icon-from-ico=icon.ico --company-name="GrooveSync" --product-name="GrooveSync Agent" --file-version=2.0.0 --product-version=2.0.0 --file-description="GrooveSync Local Agent" --windows-console-mode=disable --include-data-files=icon.ico=icon.ico --include-data-files=logo.png=logo.png --output-filename=GrooveSyncAgent.exe agent.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-Windows
          path: GrooveSyncAgent.exe

  build-macos:
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: '11.0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install nuitka pystray pillow aiohttp cloudinary ordered-set zstandard imageio
      - name: Build with Nuitka
        run: |
          export MACOSX_DEPLOYMENT_TARGET=11.0
          python -m nuitka --onefile --assume-yes-for-downloads --enable-plugin=tk-inter --macos-app-icon=logo.png --company-name="GrooveSync" --product-name="GrooveSync Agent" --include-data-files=logo.png=logo.png --output-filename=GrooveSyncAgent agent.py
      - name: Create .app bundle
        run: |
          APP="dist/GrooveSyncAgent.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          mv GrooveSyncAgent "$APP/Contents/MacOS/GrooveSyncAgent"
          chmod +x "$APP/Contents/MacOS/GrooveSyncAgent"

          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>GrooveSyncAgent</string>
            <key>CFBundleDisplayName</key>
            <string>GrooveSync Agent</string>
            <key>CFBundleIdentifier</key>
            <string>com.groovesync.agent</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleExecutable</key>
            <string>GrooveSyncAgent</string>
            <key>LSUIElement</key>
            <true/>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          if [ -f logo.png ]; then
            mkdir -p icon.iconset
            sips -z 512 512 logo.png --out icon.iconset/icon_512x512.png 2>/dev/null || true
            sips -z 256 256 logo.png --out icon.iconset/icon_256x256.png 2>/dev/null || true
            sips -z 128 128 logo.png --out icon.iconset/icon_128x128.png 2>/dev/null || true
            iconutil -c icns icon.iconset -o "$APP/Contents/Resources/icon.icns" 2>/dev/null || true
          fi

      - name: Ad-hoc codesign
        run: codesign --force --deep --sign - dist/GrooveSyncAgent.app

      - name: Zip .app bundle
        run: cd dist && zip -r GrooveSyncAgent-macOS.zip GrooveSyncAgent.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-macOS
          path: dist/GrooveSyncAgent-macOS.zip

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/agent-Windows/GrooveSyncAgent.exe
