name: Build Agent

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install nuitka pystray pillow aiohttp cloudinary ordered-set zstandard
      - name: Build with Nuitka
        run: |
          python -m nuitka --onefile --assume-yes-for-downloads --enable-plugin=tk-inter --windows-icon-from-ico=icon.ico --company-name="GrooveSync" --product-name="GrooveSync Agent" --file-version=2.0.0 --product-version=2.0.0 --file-description="GrooveSync Local Agent" --windows-console-mode=disable --include-data-files=icon.ico=icon.ico --include-data-files=logo.png=logo.png --output-filename=GrooveSyncAgent.exe agent.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-Windows
          path: GrooveSyncAgent.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyinstaller rumps pystray pillow aiohttp cloudinary selenium webdriver-manager
      - name: Create menubar icon
        run: |
          python -c "
          from PIL import Image
          img = Image.open('logo_transparent.png').convert('RGBA')
          w, h = img.size
          s = min(w, h)
          left = (w - s) // 2
          top = (h - s) // 2
          img = img.crop((left, top, left + s, top + s))
          img = img.resize((44, 44), Image.LANCZOS)
          img.save('menubar_icon.png')
          "
      - name: Build with PyInstaller
        run: pyinstaller -y GrooveSyncAgent.spec
      - name: Zip .app bundle
        run: cd dist && zip -r GrooveSyncAgent-macOS.zip GrooveSyncAgent.app
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-macOS
          path: dist/GrooveSyncAgent-macOS.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/agent-Windows/GrooveSyncAgent.exe
            artifacts/agent-macOS/GrooveSyncAgent-macOS.zip
